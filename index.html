<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lovingwoodz | Luxury Wood Interiors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Cormorant Garamond', 'serif'],
            sans: ['Jost', 'sans-serif'],
          },
          colors: {
            wood: {
              black: '#0C0907',
              deep: '#1A1008',
              dark: '#2C1E14',
              mid: '#4A3728',
              gold: '#C4A35A',
              'gold-light': '#D4B96A',
              sage: '#8F9779',
              ivory: '#F5EFE6',
              'ivory-dim': 'rgba(245,239,230,0.6)',
              'ivory-muted': 'rgba(245,239,230,0.35)',
            }
          },
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0C0907;
      --deep: #1A1008;
      --dark: #2C1E14;
      --mid: #4A3728;
      --gold: #C4A35A;
      --gold-light: #D4B96A;
      --sage: #8F9779;
      --ivory: #F5EFE6;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      background-color: var(--black);
      color: var(--ivory);
      cursor: none;
      overflow-x: hidden;
    }

    /* ── CUSTOM CURSOR ── */
    #cursor-dot {
      position: fixed;
      top: 0; left: 0;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background 0.2s;
      will-change: transform;
    }
    #cursor-ring {
      position: fixed;
      top: 0; left: 0;
      width: 40px; height: 40px;
      border: 1px solid rgba(196,163,90,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.35s var(--ease-out-expo), height 0.35s var(--ease-out-expo), border-color 0.2s, background 0.2s;
      will-change: transform;
    }
    body:has(a:hover) #cursor-ring,
    body:has(button:hover) #cursor-ring {
      width: 64px; height: 64px;
      border-color: var(--gold);
      background: rgba(196,163,90,0.05);
    }
    body:has(a:hover) #cursor-dot,
    body:has(button:hover) #cursor-dot {
      width: 4px; height: 4px;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.032;
      pointer-events: none;
      z-index: 9000;
      animation: grain 0.5s steps(3) infinite;
    }
    @keyframes grain {
      0%,100% { transform: translate(0,0); }
      10% { transform: translate(-2%,-2%); }
      20% { transform: translate(2%,2%); }
      30% { transform: translate(-1%,3%); }
      40% { transform: translate(3%,-1%); }
      50% { transform: translate(-3%,1%); }
      60% { transform: translate(1%,-3%); }
      70% { transform: translate(-2%,2%); }
      80% { transform: translate(2%,-2%); }
      90% { transform: translate(-1%,1%); }
    }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.9s var(--ease-out-expo), transform 0.9s var(--ease-out-expo);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    .reveal-left {
      opacity: 0;
      transform: translateX(-40px);
      transition: opacity 0.9s var(--ease-out-expo), transform 0.9s var(--ease-out-expo);
    }
    .reveal-left.visible { opacity: 1; transform: translateX(0); }

    .reveal-right {
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.9s var(--ease-out-expo), transform 0.9s var(--ease-out-expo);
    }
    .reveal-right.visible { opacity: 1; transform: translateX(0); }

    .reveal-scale {
      opacity: 0;
      transform: scale(0.94);
      transition: opacity 1.1s var(--ease-out-expo), transform 1.1s var(--ease-out-expo);
    }
    .reveal-scale.visible { opacity: 1; transform: scale(1); }

    /* stagger delays */
    .delay-1 { transition-delay: 0.1s; }
    .delay-2 { transition-delay: 0.2s; }
    .delay-3 { transition-delay: 0.3s; }
    .delay-4 { transition-delay: 0.4s; }
    .delay-5 { transition-delay: 0.5s; }
    .delay-6 { transition-delay: 0.6s; }
    .delay-7 { transition-delay: 0.7s; }
    .delay-8 { transition-delay: 0.8s; }

    /* ── IMAGE REVEAL CLIP ── */
    .clip-reveal {
      clip-path: inset(100% 0 0 0);
      transition: clip-path 1.2s var(--ease-out-expo);
    }
    .clip-reveal.visible { clip-path: inset(0% 0 0 0); }

    /* ── LINE GROW ── */
    .line-grow {
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 1s var(--ease-out-expo);
    }
    .line-grow.visible { transform: scaleX(1); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

    /* ── GOLD UNDERLINE LINKS ── */
    .gold-link {
      position: relative;
      display: inline-block;
    }
    .gold-link::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0;
      width: 100%; height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.4s var(--ease-out-expo);
    }
    .gold-link:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    /* ── MAGNETIC BUTTON ── */
    .btn-luxury {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 44px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--ivory);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: none;
      overflow: hidden;
      transition: color 0.4s;
    }
    .btn-luxury::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform 0.5s var(--ease-out-expo);
    }
    .btn-luxury:hover::before { transform: translateX(0); }
    .btn-luxury:hover { color: var(--black); }
    .btn-luxury span, .btn-luxury svg { position: relative; z-index: 1; }

    .btn-solid {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 44px;
      background: var(--gold);
      color: var(--black);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: none;
      overflow: hidden;
      transition: background 0.4s, color 0.4s;
    }
    .btn-solid:hover { background: var(--ivory); }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ── DISPLAY HEADING ── */
    .display { font-family: 'Cormorant Garamond', serif; }

    /* ── HORIZONTAL RULE ── */
    .hr-gold { height: 1px; background: linear-gradient(90deg, var(--gold), transparent); }

    /* ── PARALLAX IMAGE ── */
    .parallax-wrap { overflow: hidden; }
    .parallax-img {
      will-change: transform;
      transform: scale(1.12);
    }

    /* ── VIDEO OVERLAY ── */
    .video-overlay { background: linear-gradient(to bottom, rgba(12,9,7,0.2) 0%, rgba(12,9,7,0.7) 100%); }

    /* Counter animation */
    .counter { font-variant-numeric: tabular-nums; }

    /* Marquee */
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    .marquee-track { animation: marquee 30s linear infinite; }
    .marquee-track:hover { animation-play-state: paused; }
  </style>
</head>
<body>
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>
  <div id="root"></div>
  <script type="importmap">
  {
    "imports": {
      "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
      "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
      "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
      "react/": "https://esm.sh/react@^19.2.3/",
      "react": "https://esm.sh/react@^19.2.3"
    }
  }
  </script>
  <link rel="stylesheet" href="/index.css" />
  <script type="module" src="/index.tsx"></script>
  <script>
    // Cursor
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    function animCursor() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      dot.style.left = mx + 'px';
      dot.style.top = my + 'px';
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(animCursor);
    }
    animCursor();

    // Scroll Reveal
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.1 });
    function initReveal() {
      document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale, .clip-reveal, .line-grow').forEach(el => observer.observe(el));
    }
    document.addEventListener('DOMContentLoaded', initReveal);
    // Re-run after React renders
    let lastCount = 0;
    setInterval(() => {
      const count = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale, .clip-reveal, .line-grow').length;
      if (count !== lastCount) { initReveal(); lastCount = count; }
    }, 400);
  </script>
</body>
</html>
